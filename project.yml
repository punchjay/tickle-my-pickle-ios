name: TickleMyPickle
options:
  bundleIdPrefix: com.punchjay
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  TickleMyPickle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TickleMyPickle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.punchjay.ticklemypickle
        PRODUCT_NAME: TickleMyPickle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # iPhone-only for v1: avoids the extra 13" iPad screenshot set in App
        # Store Connect and App Review scrutiny of a stretched phone layout.
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: TickleMyPickle/Info.plist
      properties:
        CFBundleDisplayName: Tickle My Pickle
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "We use your location to find pickleball courts near you."
        GoogleMapsRestAPIKey: "$(GOOGLE_MAPS_REST_API_KEY)"
        # Bundled fonts (see Resources/Fonts/). XcodeGen flattens the group into
        # the bundle root, so these are bare filenames. Support/Fonts.swift looks
        # them up by PostScript name and falls back to system fonts if absent.
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-Bold.ttf
          - Fredoka-SemiBold.ttf
  TickleMyPickleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TickleMyPickleTests
    dependencies:
      - target: TickleMyPickle
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: TickleMyPickleTests/Info.plist
  TickleMyPickleUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TickleMyPickleUITests
    dependencies:
      - target: TickleMyPickle
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TickleMyPickle:
    build:
      targets:
        TickleMyPickle: all
        TickleMyPickleTests: [test]
        TickleMyPickleUITests: [test]
    test:
      targets: [TickleMyPickleTests, TickleMyPickleUITests]
    run:
      config: Debug
      # Silence noisy OS-level console chatter (Network.framework, MapKit,
      # CAMetalLayer first-layout logs) so real app output stands out. This
      # only affects the Run action in Xcode; it does not change the build.
      environmentVariables:
        - variable: OS_ACTIVITY_MODE
          value: disable
          isEnabled: true
