name: TickleMyPickle
options:
  bundleIdPrefix: com.punchjay
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  TickleMyPickle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TickleMyPickle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.punchjay.ticklemypickle
        PRODUCT_NAME: TickleMyPickle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: TickleMyPickle/Info.plist
      properties:
        CFBundleDisplayName: Tickle My Pickle
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "We use your location to find pickleball courts near you."
        GoogleMapsRestAPIKey: "$(GOOGLE_MAPS_REST_API_KEY)"
  TickleMyPickleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TickleMyPickleTests
    dependencies:
      - target: TickleMyPickle
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: TickleMyPickleTests/Info.plist
schemes:
  TickleMyPickle:
    build:
      targets:
        TickleMyPickle: all
        TickleMyPickleTests: [test]
    test:
      targets: [TickleMyPickleTests]
    run:
      config: Debug
